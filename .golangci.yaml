run:
  timeout: 5m
  tests: true
  go: '1.26'

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - ineffassign
    - gosimple
    - unused
    - whitespace
    - bodyclose
    - errorlint
    - nolintlint
    - stylecheck
    - unconvert

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  misspell:
    locale: US

issues:
  exclude-rules:
    # Allow nolint directives with explanation
    - linters:
        - nolintlint
      text: "directive `//nolint` is unused"

    # Allow underscore imports (used for side effects)
    - linters:
        - unused
      text: "imported but not used"
      source: "^import _"

    # Allow intentional error ignoring with blank identifier in tests
    - linters:
        - errcheck
      source: "^\\s*_, _ :="
      text: "Error return value is not checked"

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
