name: Post-Release Smoke

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to validate (for example v1.2.3).
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve target release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            tag="$INPUT_TAG"
          fi

          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Failed to resolve release tag"
            exit 1
          fi

          echo "Using release tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  wait-for-assets:
    name: Wait for Release Assets
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
      - name: Poll until release assets are available
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # GoReleaser runs in parallel and may not have uploaded assets yet
          # when the release.published event fires. Poll until assets appear.
          max_attempts=10
          delay=30

          for attempt in $(seq 1 "$max_attempts"); do
            asset_count=$(gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" --json assets --jq '.assets | length')
            echo "Attempt $attempt/$max_attempts: release $RELEASE_TAG has $asset_count asset(s)"

            if [ "$asset_count" -gt 0 ]; then
              echo "Assets available, proceeding with smoke tests"
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::Release $RELEASE_TAG still has no assets after $(((max_attempts - 1) * delay))s. GoReleaser may have failed (e.g. invalid semver tag)."
              exit 1
            fi

            echo "Waiting ${delay}s for GoReleaser to finish uploading assets..."
            sleep "$delay"
          done

  linux-ubuntu:
    name: install.sh (ubuntu:24.04)
    needs: [resolve-release, wait-for-assets]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Install and validate in Docker
        id: validate
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          docker pull ubuntu:24.04

          version=$(docker run --rm -e RELEASE_TAG="$RELEASE_TAG" -e REPO="$REPO" ubuntu:24.04 /bin/sh -lc '
            set -e
            apt-get update >/dev/null 2>&1
            apt-get install -y --no-install-recommends ca-certificates curl >/dev/null 2>&1

            tag_script_url="https://raw.githubusercontent.com/${REPO}/${RELEASE_TAG}/install.sh"
            fallback_script_url="https://raw.githubusercontent.com/${REPO}/master/install.sh"

            if curl -fsSL "$tag_script_url" -o /tmp/install.sh 2>/dev/null; then
              echo "Using install.sh from release tag: $RELEASE_TAG" >&2
            else
              echo "Could not fetch install.sh from $RELEASE_TAG, falling back to master" >&2
              curl -fsSL "$fallback_script_url" -o /tmp/install.sh
            fi

            VERSION="$RELEASE_TAG" INSTALL_DIR="/usr/local/bin" sh /tmp/install.sh >&2

            /usr/local/bin/gitm --version

            /usr/local/bin/gitm --help >/dev/null
          ')

          echo "Installed: $version"

          if ! echo "$version" | grep -q "^gitm version v"; then
            echo "Error: gitm --version did not produce valid output"
            exit 1
          fi

          if ! echo "$version" | grep -Fq "$RELEASE_TAG"; then
            echo "::warning::Installed version ($version) does not exactly match release tag ($RELEASE_TAG)"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  linux-debian:
    name: install.sh (debian:bookworm-slim)
    needs: [resolve-release, wait-for-assets]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Install and validate in Docker
        id: validate
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          docker pull debian:bookworm-slim

          version=$(docker run --rm -e RELEASE_TAG="$RELEASE_TAG" -e REPO="$REPO" debian:bookworm-slim /bin/sh -lc '
            set -e
            apt-get update >/dev/null 2>&1
            apt-get install -y --no-install-recommends ca-certificates curl >/dev/null 2>&1

            tag_script_url="https://raw.githubusercontent.com/${REPO}/${RELEASE_TAG}/install.sh"
            fallback_script_url="https://raw.githubusercontent.com/${REPO}/master/install.sh"

            if curl -fsSL "$tag_script_url" -o /tmp/install.sh 2>/dev/null; then
              echo "Using install.sh from release tag: $RELEASE_TAG" >&2
            else
              echo "Could not fetch install.sh from $RELEASE_TAG, falling back to master" >&2
              curl -fsSL "$fallback_script_url" -o /tmp/install.sh
            fi

            VERSION="$RELEASE_TAG" INSTALL_DIR="/usr/local/bin" sh /tmp/install.sh >&2

            /usr/local/bin/gitm --version

            /usr/local/bin/gitm --help >/dev/null
          ')

          echo "Installed: $version"

          if ! echo "$version" | grep -q "^gitm version v"; then
            echo "Error: gitm --version did not produce valid output"
            exit 1
          fi

          if ! echo "$version" | grep -Fq "$RELEASE_TAG"; then
            echo "::warning::Installed version ($version) does not exactly match release tag ($RELEASE_TAG)"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  macos-homebrew-cask:
    name: Homebrew Cask (macOS)
    needs: [resolve-release, wait-for-assets]
    runs-on: macos-latest
    outputs:
      version: ${{ steps.install.outputs.version }}
    steps:
      - name: Install from Homebrew cask and verify version
        id: install
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt/5"
            brew tap alexandreafj/gitm

            if brew list --cask gitm >/dev/null 2>&1; then
              brew upgrade --cask gitm || brew reinstall --cask gitm
            else
              brew install --cask gitm
            fi

            version="$(gitm --version)"
            echo "$version"
            if echo "$version" | grep -Fq "$RELEASE_TAG"; then
              break
            fi

            if echo "$version" | grep -q "^gitm version v"; then
              echo "::warning::Installed version ($version) does not exactly match release tag ($RELEASE_TAG)"
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Homebrew cask did not provide a working gitm install"
              exit 1
            fi

            brew uninstall --cask --force gitm >/dev/null 2>&1 || true
            brew update >/dev/null || true
            sleep 60
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate command behavior
        run: |
          set -euo pipefail

          gitm --help >/tmp/gitm-help.txt
          test -s /tmp/gitm-help.txt

          set +e
          upgrade_output="$(gitm upgrade 2>&1)"
          upgrade_status=$?
          set -e

          echo "$upgrade_output"
          if [ "$upgrade_status" -eq 0 ]; then
            echo "Expected gitm upgrade to be blocked for Homebrew installs"
            exit 1
          fi
          echo "$upgrade_output" | grep -F "brew upgrade --cask gitm" >/dev/null

  windows-scoop:
    name: Scoop (Windows)
    needs: [resolve-release, wait-for-assets]
    runs-on: windows-latest
    outputs:
      version: ${{ steps.install.outputs.version }}
    steps:
      - name: Install Scoop if needed
        shell: pwsh
        run: |
          if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
            Invoke-RestMethod -Uri get.scoop.sh | Invoke-Expression
          }
          scoop --version
          $scoopShims = Join-Path $env:USERPROFILE "scoop\shims"
          Add-Content -Path $env:GITHUB_PATH -Value $scoopShims -Encoding utf8

      - name: Install from Scoop and verify version
        id: install
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          $expectedTag = $env:RELEASE_TAG
          $maxAttempts = 5

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Attempt $attempt/$maxAttempts"

            if ((scoop list 2>$null | Select-String -Pattern '^gitm\s')) {
              scoop uninstall gitm
            }

            if ((scoop bucket list | Select-String -Pattern '^gitm\s')) {
              scoop bucket rm gitm
            }

            scoop bucket add gitm https://github.com/alexandreafj/scoop-gitm
            scoop install gitm

            $versionOutput = gitm --version
            Write-Host $versionOutput
            if ($versionOutput -match [regex]::Escape($expectedTag)) {
              break
            }

            if ($versionOutput -match "^gitm version v") {
              Write-Host "::warning::Installed version ($versionOutput) does not exactly match release tag ($expectedTag)"
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "Scoop install did not provide a working gitm install"
            }

            scoop update
            Start-Sleep -Seconds 60
          }

          "version=$versionOutput" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Validate command behavior
        shell: pwsh
        run: |
          $helpOutput = (gitm --help | Out-String)
          if ([string]::IsNullOrWhiteSpace($helpOutput)) {
            throw "gitm --help returned empty output"
          }

          # PowerShell 7.4+ treats non-zero native exits as terminating errors
          # when $PSNativeCommandUseErrorActionPreference is true (the default).
          # Disable it so we can inspect the exit code ourselves.
          $PSNativeCommandUseErrorActionPreference = $false

          $upgradeOutput = (& gitm upgrade 2>&1)
          $upgradeStatus = $LASTEXITCODE
          $upgradeOutputText = ($upgradeOutput | Out-String)
          Write-Host $upgradeOutputText

          $PSNativeCommandUseErrorActionPreference = $true

          if ($upgradeStatus -eq 0) {
            throw "Expected gitm upgrade to be blocked for Scoop installs"
          }

          if ($upgradeOutputText -notmatch "scoop update gitm") {
            throw "Expected upgrade output to suggest scoop update gitm"
          }

          # pwsh 7.3+ uses $LASTEXITCODE as the process exit code when invoked
          # with -command. Reset it so the step doesn't fail from the expected
          # non-zero exit of gitm upgrade above.
          exit 0

  report:
    name: Smoke Report
    if: always()
    needs:
      - resolve-release
      - wait-for-assets
      - linux-ubuntu
      - linux-debian
      - macos-homebrew-cask
      - windows-scoop
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          TAG: ${{ needs.resolve-release.outputs.tag }}
          ASSETS_RESULT: ${{ needs.wait-for-assets.result }}
          UBUNTU_RESULT: ${{ needs.linux-ubuntu.result }}
          DEBIAN_RESULT: ${{ needs.linux-debian.result }}
          MACOS_RESULT: ${{ needs.macos-homebrew-cask.result }}
          WINDOWS_RESULT: ${{ needs.windows-scoop.result }}
          UBUNTU_VERSION: ${{ needs.linux-ubuntu.outputs.version }}
          DEBIAN_VERSION: ${{ needs.linux-debian.outputs.version }}
          MACOS_VERSION: ${{ needs.macos-homebrew-cask.outputs.version }}
          WINDOWS_VERSION: ${{ needs.windows-scoop.outputs.version }}
        run: |
          version_match() {
            local installed="$1" tag="$2"
            if echo "$installed" | grep -Fq "$tag"; then
              echo "exact"
            elif [ -n "$installed" ]; then
              echo "mismatch"
            else
              echo "n/a"
            fi
          }

          ubuntu_match=$(version_match "$UBUNTU_VERSION" "$TAG")
          debian_match=$(version_match "$DEBIAN_VERSION" "$TAG")
          macos_match=$(version_match "$MACOS_VERSION" "$TAG")
          windows_match=$(version_match "$WINDOWS_VERSION" "$TAG")

          {
            echo "## Post-release smoke test report"
            echo
            echo "**Target tag:** \`$TAG\`"
            echo "**Assets ready:** $ASSETS_RESULT"
            echo
            echo "| Platform | Result | Installed Version | Tag Match |"
            echo "|----------|--------|-------------------|-----------|"
            echo "| install.sh (ubuntu:24.04) | $UBUNTU_RESULT | \`${UBUNTU_VERSION:-n/a}\` | $ubuntu_match |"
            echo "| install.sh (debian:bookworm-slim) | $DEBIAN_RESULT | \`${DEBIAN_VERSION:-n/a}\` | $debian_match |"
            echo "| Homebrew cask (macOS) | $MACOS_RESULT | \`${MACOS_VERSION:-n/a}\` | $macos_match |"
            echo "| Scoop (Windows) | $WINDOWS_RESULT | \`${WINDOWS_VERSION:-n/a}\` | $windows_match |"
          } >> "$GITHUB_STEP_SUMMARY"
