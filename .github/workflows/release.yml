name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Check format
        run: make format-check

      - name: Run linting
        run: make lint-check

      - name: Run unit tests
        run: make test

      - name: Check coverage threshold
        run: make coverage-check

  build:
    needs: quality-gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS x86_64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: gitm-macos-x86_64
          # macOS ARM64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: gitm-macos-arm64
          # Linux x86_64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: gitm-linux-amd64
          # Linux ARM64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: gitm-linux-arm64
          # Windows x86_64
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: gitm-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }} -s -w" -o ${{ matrix.output }} ./cmd/gitm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in binaries/*/; do
            cp "$dir"* release/
          done
          cd release
          ls -la
          # Generate checksums
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign checksums.txt
        working-directory: release
        run: |
          cosign sign-blob --yes \
            --new-bundle-format \
            --bundle checksums.txt.bundle \
            checksums.txt
          ls -la checksums.txt.bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/gitm-*
            release/checksums.txt
            release/checksums.txt.bundle
          body: |
            ## Release ${{ github.ref_name }}
            
            ### Downloads
            All binaries are available below.
            
            ### Checksums
            Verify binary integrity with SHA256:
            ```
            sha256sum -c checksums.txt
            ```
            
            ### Signature
            `checksums.txt` is signed via cosign keyless. Verify locally:
            ```
            cosign verify-blob --bundle checksums.txt.bundle \
              --certificate-identity-regexp '^https://github\.com/alexandreafj/gitm/\.github/workflows/release\.yml@refs/tags/v.*$' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              checksums.txt
            ```
            
            ### Installation
            Extract the appropriate binary for your platform and add it to your PATH.
            
            **macOS (Intel):** `gitm-macos-x86_64`
            **macOS (Apple Silicon):** `gitm-macos-arm64`
            **Linux (x86_64):** `gitm-linux-amd64`
            **Linux (ARM64):** `gitm-linux-arm64`
            **Windows (x86_64):** `gitm-windows-amd64.exe`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
