name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Check format
        run: make format-check

      - name: Run linting
        run: make lint-check

      - name: Run unit tests
        run: make test

      - name: Check coverage threshold
        run: make coverage-check

  release:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for cosign keyless OIDC signing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full git history for changelog

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
